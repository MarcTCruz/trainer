# Deploy this workflow to the MarcTCruz/refactory-validator repo
name: Cleanup stale results

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 03:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove results for users without a fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          removed=0

          for file in results/*.json; do
            [ -f "$file" ] || continue
            username=$(basename "$file" .json)

            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${username}/refactory-validator")

            if [ "$status" = "404" ]; then
              git rm "$file"
              removed=$((removed + 1))
              echo "Removed $file (fork gone)"
            fi
          done

          if [ "$removed" -gt 0 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove ${removed} stale result file(s)"
            git push
          else
            echo "No stale results found."
          fi
